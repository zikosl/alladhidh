services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restaurant_pos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your production environment}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-restaurant_pos}"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - private

  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: migrate
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your production environment}@postgres:5432/${POSTGRES_DB:-restaurant_pos}?schema=public
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in your production environment}
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-1000}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:push:prod && npm run db:prepare:prod && npm run db:seed:prod"
    networks:
      - private

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your production environment}@postgres:5432/${POSTGRES_DB:-restaurant_pos}?schema=public
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-*}
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-1000}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-1mb}
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ready >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - private

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: backend:3000
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
    networks:
      - private

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    depends_on:
      admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - private

networks:
  public:
  private:
    internal: true

volumes:
  postgres_prod_data:
  caddy_data:
  caddy_config:
