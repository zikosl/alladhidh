<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#F45A24" />
  <title>اللذيذ - Hors ligne</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Cairo, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(244, 90, 36, 0.22), transparent 34rem),
        linear-gradient(135deg, #11100e, #241e19);
      color: #fff4e3;
    }

    main {
      width: min(520px, 100%);
      border: 1px solid rgba(255, 209, 47, 0.24);
      border-radius: 28px;
      padding: 28px;
      background: rgba(28, 24, 20, 0.88);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    img {
      width: 92px;
      height: 92px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 7vw, 42px);
      line-height: 1;
    }

    p {
      margin: 12px 0 0;
      color: #c9b8a2;
      font-size: 15px;
      line-height: 1.7;
    }

    button {
      margin-top: 22px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #f45a24;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main>
    <img src="/logo.png" alt="اللذيذ" />
    <h1>Mode hors ligne</h1>
    <p>La connexion au serveur est indisponible. Les pages deja chargees restent accessibles, mais les actions qui sauvegardent des donnees attendent le retour du reseau.</p>
    <button type="button" onclick="window.location.reload()">Reessayer</button>
  </main>
</body>

</html>
