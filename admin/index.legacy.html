<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant POS Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Restaurant POS</p>
          <h1>Admin Dashboard</h1>
          <p class="lead">
            Track sales, stock alerts, best sellers, and profit from a single control panel.
          </p>
        </div>
        <button id="refreshButton">Refresh data</button>
      </header>

      <main class="grid">
        <section class="card stats" id="summaryCards"></section>

        <section class="card">
          <div class="section-head">
            <h2>Daily Sales</h2>
            <span>Last 14 entries</span>
          </div>
          <div id="dailySales" class="table-wrap"></div>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>Best Selling Products</h2>
            <span>Top 10 products</span>
          </div>
          <div id="bestSellers" class="table-wrap"></div>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>Low Stock Alerts</h2>
            <span>Action required</span>
          </div>
          <div id="stockAlerts" class="table-wrap"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
